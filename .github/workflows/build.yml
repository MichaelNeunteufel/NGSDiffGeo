name: Build, upload to PyPI, and deploy documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        cibw_build:
          - cp310-* cp311-* cp312-* cp313-*
        include:
          - os: windows-2022
            cibw-arch: AMD64
            cmake-generator: "Visual Studio 17 2022"
            cmake_generator_platform: "x64"
            cibw_build: cp310-* cp311-* cp312-* cp313-*
    env:
      CIBW_BUILD: ${{ matrix.cibw_build }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: 'true'
          fetch-depth: 0

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: 'true'
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  tests:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: [build_wheels]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          pattern: cibw-wheels-ubuntu*
          path: wheels
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest "mkl<2026"
          python -m pip install "$(ls wheels/*cp312*.whl | head -n 1)"

          echo "Installed packages:"
          python -m pip show ngsolve mkl ngsdiffgeo || true

          MKL_DIR=$(python - <<'PY'
          import pathlib
          import site
          import sys

          roots = [pathlib.Path(sys.prefix)]
          roots += [pathlib.Path(p) for p in site.getsitepackages()]

          for root in roots:
              if root.exists():
                  for p in root.rglob("libmkl_rt.so.2"):
                      print(p.parent)
                      raise SystemExit(0)

          raise SystemExit("libmkl_rt.so.2 not found")
          PY
          )

          echo "Found MKL in: $MKL_DIR"
          echo "LD_LIBRARY_PATH=$MKL_DIR:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          python -c "import ngsolve; print('NGSolve import OK:', ngsolve.__version__)"
          pytest -v -ra --tb=short --disable-warnings tests/

  publish_testpypi:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist, tests]
    runs-on: ubuntu-latest

    # Publish every commit to main to TestPyPI
    # setuptools_scm will generate a new .devN version per commit.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: publish-testpypi
      url: https://test.pypi.org/p/ngsdiffgeo

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, tests]
    runs-on: ubuntu-latest

    # Publish only version tags to PyPI.
    # Avoid pre-release tags like .devN, rcN, aN, bN.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '.dev') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b')

    environment:
      name: publish_pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: false

  docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist, tests]
    container: python:3.12

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          path: "NGSDiffGeo"

      - name: Install dependencies
        run: |
          apt update -y && DEBIAN_FRONTEND="noninteractive" apt install -y git pandoc
          python -m pip install --upgrade pip
          python -m pip install -r "$GITHUB_WORKSPACE/NGSDiffGeo/docs/requirements.txt"
          python -m pip install ipywidgets webgui_jupyter_widgets

      - uses: actions/download-artifact@v7
        with:
          pattern: cibw-wheels-ubuntu*
          path: wheels
          merge-multiple: true

      - name: List wheels
        run: |
          ls -R wheels

      - name: Install ngsdiffgeo and expose MKL
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mkl<2026"
          python -m pip install "$(ls wheels/*cp312*.whl | head -n 1)"

          echo "Installed packages:"
          python -m pip show ngsolve mkl ngsdiffgeo || true

          MKL_DIR=$(python - <<'PY'
          import pathlib
          import site
          import sys

          roots = [pathlib.Path(sys.prefix)]
          roots += [pathlib.Path(p) for p in site.getsitepackages()]

          for root in roots:
              if root.exists():
                  for p in root.rglob("libmkl_rt.so.2"):
                      print(p.parent)
                      raise SystemExit(0)

          raise SystemExit("libmkl_rt.so.2 not found")
          PY
          )

          echo "Found MKL in: $MKL_DIR"
          echo "LD_LIBRARY_PATH=$MKL_DIR:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Build docs with Sphinx
        working-directory: NGSDiffGeo/docs
        run: |
          python -c "import ngsolve; print('NGSolve import OK:', ngsolve.__version__)"
          python -c "import ngsdiffgeo; print('NGSDiffGeo import OK')"
          make html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: NGSDiffGeo/docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
